server {
    listen 8443 ssl;
    server_name argocd.meiot.live;

    ssl_certificate     /etc/letsencrypt/live/argocd.meiot.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/argocd.meiot.live/privkey.pem;

    location / {
        proxy_pass http://192.168.1.104:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

